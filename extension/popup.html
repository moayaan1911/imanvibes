<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ImanVibes Salah Companion</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="brand-row">
        <div class="brand-lockup">
          <img class="brand-icon" src="assets/icon.png" alt="ImanVibes icon" />
          <div>
            <p class="brand-title">
              <span class="brand-arabic">إيمان</span>
              <span class="brand-vibes">Vibes</span>
            </p>
            <p class="brand-tagline">Quranic comfort for every mood</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="go-link-button" id="goToImanVibesButton" type="button">
            <span>Go To ImanVibes</span>
            <svg viewBox="0 0 512 512" aria-hidden="true">
              <path d="M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l82.7 0L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3l0 82.7c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160c0-17.7-14.3-32-32-32L320 0zM80 32C35.8 32 0 67.8 0 112L0 432c0 44.2 35.8 80 80 80l320 0c44.2 0 80-35.8 80-80l0-112c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 112c0 8.8-7.2 16-16 16L80 448c-8.8 0-16-7.2-16-16l0-320c0-8.8 7.2-16 16-16l112 0c17.7 0 32-14.3 32-32s-14.3-32-32-32L80 32z" />
            </svg>
          </button>
          <button class="settings-trigger" id="settingsButton" type="button" aria-label="Open ImanVibes settings" title="Settings">
            <svg viewBox="0 0 512 512" aria-hidden="true">
              <path d="M495.9 166.6c3.2 8.7 .5 18.4-6.4 24.6l-43.3 39.4c1.1 8.3 1.7 16.8 1.7 25.4s-.6 17.1-1.7 25.4l43.3 39.4c6.9 6.2 9.6 15.9 6.4 24.6c-4.4 11.9-9.7 23.3-15.8 34.3l-4.7 8.1c-6.6 11-14 21.4-22.1 31.2c-5.9 7.2-15.7 9.6-24.5 6.8l-55.7-17.7c-13.4 10.3-28.2 18.9-44 25.4l-12.5 57.1c-2 9.1-9 16.3-18.2 17.8c-13.8 2.3-28 3.5-42.5 3.5s-28.7-1.2-42.5-3.5c-9.2-1.5-16.2-8.7-18.2-17.8l-12.5-57.1c-15.8-6.5-30.6-15.1-44-25.4L83.1 425.9c-8.8 2.8-18.6 .3-24.5-6.8c-8.1-9.8-15.5-20.2-22.1-31.2l-4.7-8.1c-6.1-11-11.4-22.4-15.8-34.3c-3.2-8.7-.5-18.4 6.4-24.6l43.3-39.4C64.6 273.1 64 264.6 64 256s.6-17.1 1.7-25.4L22.4 191.2c-6.9-6.2-9.6-15.9-6.4-24.6c4.4-11.9 9.7-23.3 15.8-34.3l4.7-8.1c6.6-11 14-21.4 22.1-31.2c5.9-7.2 15.7-9.6 24.5-6.8l55.7 17.7c13.4-10.3 28.2-18.9 44-25.4l12.5-57.1c2-9.1 9-16.3 18.2-17.8C227.3 1.2 241.5 0 256 0s28.7 1.2 42.5 3.5c9.2 1.5 16.2 8.7 18.2 17.8l12.5 57.1c15.8 6.5 30.6 15.1 44 25.4l55.7-17.7c8.8-2.8 18.6-.3 24.5 6.8c8.1 9.8 15.5 20.2 22.1 31.2l4.7 8.1c6.1 11 11.4 22.4 15.8 34.3zM256 336a80 80 0 1 0 0-160 80 80 0 1 0 0 160z" />
            </svg>
          </button>
        </div>
      </header>

      <p class="hijri-kicker" id="hijriDate">Location needed</p>

      <section class="timing-card">
        <div class="timing-top">
          <div>
            <p class="eyebrow" id="timingEyebrow">Prayer Times</p>
            <h1 id="nextPrayerName">Disabled</h1>
          </div>
          <div class="timing-actions">
            <span class="time-pill" id="nextPrayerTime" hidden></span>
            <button class="round-button" id="searchButton" type="button" aria-label="Search city">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.8 18a7.2 7.2 0 1 1 5.1-12.3A7.2 7.2 0 0 1 10.8 18Zm0-2a5.2 5.2 0 1 0 0-10.4 5.2 5.2 0 0 0 0 10.4Zm10 5-5.1-5.1 1.4-1.4 5.1 5.1-1.4 1.4Z" />
              </svg>
            </button>
            <button class="round-button primary" id="locationButton" type="button" aria-label="Fetch location">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 2.3 4.1 20.8l8.2-3.5 7.6 3.5L12 2.3Zm0 5.2 3.9 9.1-3.7-1.7-4 1.7L12 7.5Z" />
              </svg>
            </button>
          </div>
        </div>

        <form class="search-panel" id="searchForm" hidden>
          <input id="cityInput" type="search" autocomplete="off" placeholder="Search city, e.g. Lucknow" />
          <div class="suggestions" id="suggestions"></div>
        </form>

        <div class="remaining-card" id="remainingCard">
          <div>
            <p id="remainingLabel">Enable Location access to See timings</p>
            <strong id="remainingTime">Tap the location icon or search your city.</strong>
          </div>
          <div class="hourglass" aria-hidden="true">
            <svg viewBox="0 0 384 512">
              <path d="M32 0C14.3 0 0 14.3 0 32S14.3 64 32 64l0 11c0 42.4 16.9 83.1 46.9 113.1L146.7 256 78.9 323.9C48.9 353.9 32 394.6 32 437l0 11c-17.7 0-32 14.3-32 32s14.3 32 32 32l32 0 256 0 32 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l0-11c0-42.4-16.9-83.1-46.9-113.1L237.3 256l67.9-67.9c30-30 46.9-70.7 46.9-113.1l0-11c17.7 0 32-14.3 32-32s-14.3-32-32-32L320 0 64 0 32 0zM96 75l0-11 192 0 0 11c0 19-5.6 37.4-16 53L112 128c-10.3-15.6-16-34-16-53zm16 309c3.5-5.3 7.6-10.3 12.1-14.9L192 301.3l67.9 67.9c4.6 4.6 8.6 9.6 12.1 14.9L112 384z" />
            </svg>
          </div>
        </div>
      </section>

      <section class="tracker-card">
        <div class="section-head">
          <h3>Daily Tracker</h3>
          <span id="completedCount">0/5 Completed</span>
        </div>
        <div class="tracker-row" id="trackerRow"></div>
      </section>

      <section class="schedule-section">
        <h3>Schedule</h3>
        <div class="schedule-list" id="scheduleList"></div>
      </section>

      <p class="status-line" id="statusLine" role="status"></p>

      <div class="settings-overlay" id="settingsOverlay" hidden>
        <section class="settings-sheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
          <div class="settings-sheet-head">
            <div>
              <p class="settings-kicker">Settings</p>
              <h2 id="settingsTitle">Extension controls</h2>
            </div>
            <button class="settings-close" id="settingsCloseButton" type="button" aria-label="Close settings">
              <svg viewBox="0 0 384 512" aria-hidden="true">
                <path d="M342.6 150.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192 210.7 86.6 105.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L146.7 256 41.4 361.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192 301.3 297.4 406.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.3 256 342.6 150.6z" />
              </svg>
            </button>
          </div>

          <div class="settings-grid">
            <article class="settings-card">
              <div class="settings-card-row">
                <span class="settings-icon">
                  <svg viewBox="0 0 448 512" aria-hidden="true">
                    <path d="M224 0c-17.7 0-32 14.3-32 32l0 19.2C119 66 64 130.6 64 208l0 18.8c0 47-17.3 92.4-48.5 127.6l-7.4 8.3c-8.4 9.4-10.4 22.9-5.3 34.4S19.4 416 32 416l384 0c12.6 0 24-7.4 29.2-18.9s3.1-25-5.3-34.4l-7.4-8.3C401.3 319.2 384 273.9 384 226.8l0-18.8c0-77.4-55-142-128-156.8L256 32c0-17.7-14.3-32-32-32zm45.3 493.3c12-12 18.7-28.3 18.7-45.3l-64 0-64 0c0 17 6.7 33.3 18.7 45.3s28.3 18.7 45.3 18.7s33.3-6.7 45.3-18.7z" />
                  </svg>
                </span>
                <div class="settings-card-body">
                  <h3>Notifications</h3>
                  <div class="settings-inline">
                    <span class="settings-pill" id="notificationStatus">Checking</span>
                    <button class="settings-secondary" id="notificationButton" type="button">Allow</button>
                  </div>
                  <div class="prayer-toggle-list" id="notificationPrefs"></div>
                </div>
              </div>
            </article>

            <article class="settings-card">
              <div class="settings-inline-card">
                <div class="settings-title-row">
                  <span class="settings-icon">
                    <svg viewBox="0 0 512 512" aria-hidden="true">
                      <path d="M352 256c0 22.2-1.2 43.6-3.3 64l-185.3 0c-2.2-20.4-3.3-41.8-3.3-64s1.2-43.6 3.3-64l185.3 0c2.2 20.4 3.3 41.8 3.3 64zm28.8-64l123.1 0c5.3 20.5 8.1 41.9 8.1 64s-2.8 43.5-8.1 64l-123.1 0c2.1-20.6 3.2-42 3.2-64s-1.1-43.4-3.2-64zm112.6-32l-116.7 0c-10-63.9-29.8-117.4-55.3-151.6c78.3 20.7 142 77.5 171.9 151.6zm-149.1 0l-176.6 0c6.1-36.4 15.5-68.6 27-94.7c10.5-23.6 22.2-40.7 33.5-51.5C239.4 3.2 248.7 0 256 0s16.6 3.2 27.8 13.8c11.3 10.8 23 27.9 33.5 51.5c11.6 26 20.9 58.2 27 94.7zM8.1 192l123.1 0c-2.1 20.6-3.2 42-3.2 64s1.1 43.4 3.2 64L8.1 320C2.8 299.5 0 278.1 0 256s2.8-43.5 8.1-64zM194.7 446.6c-11.6-26-20.9-58.2-27-94.6l176.6 0c-6.1 36.4-15.5 68.6-27 94.6c-10.5 23.6-22.2 40.7-33.5 51.5C272.6 508.8 263.3 512 256 512s-16.6-3.2-27.8-13.8c-11.3-10.8-23-27.9-33.5-51.5z" />
                    </svg>
                  </span>
                  <h3>Appearance</h3>
                </div>
                <button class="theme-toggle-button" id="themeToggleButton" type="button" aria-label="Switch theme">
                  <svg id="themeToggleIcon" viewBox="0 0 384 512" aria-hidden="true"></svg>
                  <span id="themeToggleLabel">Dark mode</span>
                </button>
              </div>
            </article>

            <article class="settings-card action-card">
              <button class="settings-action-button" id="shareButton" type="button">
                <span class="settings-title-row">
                  <span class="settings-icon">
                    <svg viewBox="0 0 448 512" aria-hidden="true">
                      <path d="M352 224c53 0 96-43 96-96s-43-96-96-96s-96 43-96 96c0 4 .2 8 .7 11.9l-94.1 47C145.4 170.2 121.9 160 96 160c-53 0-96 43-96 96s43 96 96 96c25.9 0 49.4-10.2 66.6-26.9l94.1 47c-.5 3.9-.7 7.8-.7 11.9c0 53 43 96 96 96s96-43 96-96s-43-96-96-96c-25.9 0-49.4 10.2-66.6 26.9l-94.1-47c.5-3.9 .7-7.8 .7-11.9s-.2-8-.7-11.9l94.1-47C302.6 213.8 326.1 224 352 224z" />
                    </svg>
                  </span>
                  <span id="shareButtonLabel">Share ImanVibes</span>
                </span>
                <svg class="action-trail-icon" viewBox="0 0 448 512" aria-hidden="true">
                  <path d="M352 224c53 0 96-43 96-96s-43-96-96-96s-96 43-96 96c0 4 .2 8 .7 11.9l-94.1 47C145.4 170.2 121.9 160 96 160c-53 0-96 43-96 96s43 96 96 96c25.9 0 49.4-10.2 66.6-26.9l94.1 47c-.5 3.9-.7 7.8-.7 11.9c0 53 43 96 96 96s96-43 96-96s-43-96-96-96c-25.9 0-49.4 10.2-66.6 26.9l-94.1-47c.5-3.9 .7-7.8 .7-11.9s-.2-8-.7-11.9l94.1-47C302.6 213.8 326.1 224 352 224z" />
                </svg>
              </button>
            </article>

            <article class="settings-card">
              <div class="settings-card-row">
                <span class="settings-icon">
                  <svg viewBox="0 0 512 512" aria-hidden="true">
                    <path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM216 336l24 0 0-64-24 0c-13.3 0-24-10.7-24-24s10.7-24 24-24l48 0c13.3 0 24 10.7 24 24l0 88 8 0c13.3 0 24 10.7 24 24s-10.7 24-24 24l-80 0c-13.3 0-24-10.7-24-24s10.7-24 24-24zm40-208a32 32 0 1 1 0 64 32 32 0 1 1 0-64z" />
                  </svg>
                </span>
                <div class="settings-card-body">
                  <h3>About</h3>
                  <span class="settings-pill">v0.0.1</span>
                </div>
              </div>
            </article>

            <article class="settings-card">
              <div class="settings-card-row">
                <span class="settings-icon">
                  <svg viewBox="0 0 512 512" aria-hidden="true">
                    <path d="M352 256c0 22.2-1.2 43.6-3.3 64l-185.3 0c-2.2-20.4-3.3-41.8-3.3-64s1.2-43.6 3.3-64l185.3 0c2.2 20.4 3.3 41.8 3.3 64zm28.8-64l123.1 0c5.3 20.5 8.1 41.9 8.1 64s-2.8 43.5-8.1 64l-123.1 0c2.1-20.6 3.2-42 3.2-64s-1.1-43.4-3.2-64zM8.1 192l123.1 0c-2.1 20.6-3.2 42-3.2 64s1.1 43.4 3.2 64L8.1 320C2.8 299.5 0 278.1 0 256s2.8-43.5 8.1-64z" />
                  </svg>
                </span>
                <div class="settings-card-body">
                  <h3>Links</h3>
                  <div class="link-grid">
                    <button class="link-tile" data-url="https://imanvibes.vercel.app" type="button">
                      <svg viewBox="0 0 512 512" aria-hidden="true">
                        <path d="M352 256c0 22.2-1.2 43.6-3.3 64l-185.3 0c-2.2-20.4-3.3-41.8-3.3-64s1.2-43.6 3.3-64l185.3 0c2.2 20.4 3.3 41.8 3.3 64zM8.1 192l123.1 0c-2.1 20.6-3.2 42-3.2 64s1.1 43.4 3.2 64L8.1 320C2.8 299.5 0 278.1 0 256s2.8-43.5 8.1-64zM493.4 352c-30 74.1-93.6 130.9-171.9 151.6c25.5-34.2 45.2-87.7 55.3-151.6l116.7 0z" />
                      </svg>
                      ImanVibes
                    </button>
                    <button class="link-tile" data-url="https://github.com/moayaan1911/imanvibes" type="button">
                      <svg viewBox="0 0 496 512" aria-hidden="true">
                        <path d="M244.8 8C106.1 8 0 113.3 0 252c0 110.9 69.8 205.8 169.5 239.2 12.8 2.3 17.3-5.6 17.3-12.1 0-6.2-.3-40.4-.3-61.4 0 0-70 15-84.7-29.8 0 0-11.4-29.1-27.8-36.6 0 0-22.9-15.7 1.6-15.4 0 0 24.9 2 38.6 25.8 21.9 38.6 58.6 27.5 72.9 20.9 2.3-16 8.8-27.1 16-33.7-55.9-6.2-112.3-14.3-112.3-110.5 0-27.5 7.6-41.3 23.6-58.9-2.6-6.5-11.1-33.3 2.6-67.9 20.9-6.5 69 27 69 27 20-5.6 41.5-8.5 62.8-8.5s42.8 2.9 62.8 8.5c0 0 48.1-33.6 69-27 13.7 34.7 5.2 61.4 2.6 67.9 16 17.7 25.8 31.5 25.8 58.9 0 96.5-58.9 104.2-114.8 110.5 9.2 7.9 17 22.9 17 46.4 0 33.7-.3 75.4-.3 83.6 0 6.5 4.6 14.4 17.3 12.1C428.2 457.8 496 362.9 496 252 496 113.3 383.5 8 244.8 8z" />
                      </svg>
                      GitHub
                    </button>
                    <button class="link-tile" data-url="https://moayaan.com" type="button">
                      <svg viewBox="0 0 512 512" aria-hidden="true">
                        <path d="M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l82.7 0L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3l0 82.7c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160c0-17.7-14.3-32-32-32L320 0zM80 32C35.8 32 0 67.8 0 112L0 432c0 44.2 35.8 80 80 80l320 0c44.2 0 80-35.8 80-80l0-112c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 112c0 8.8-7.2 16-16 16L80 448c-8.8 0-16-7.2-16-16l0-320c0-8.8 7.2-16 16-16l112 0c17.7 0 32-14.3 32-32s-14.3-32-32-32L80 32z" />
                      </svg>
                      moayaan.com
                    </button>
                  </div>
                </div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
